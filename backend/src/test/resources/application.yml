spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:studycafe-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.springframework.security: WARN

jwt:
  secret: test-local-secret-key-for-jwt-signing-2026-123456
  access-token-expiration-millis: 3600000
